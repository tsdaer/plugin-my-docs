apiVersion: v1alpha1
kind: Role
metadata:
  name: my-docs-role-view
  labels:
    halo.run/role-template: "true"
  annotations:
    rbac.authorization.halo.run/module: "文档管理"
    rbac.authorization.halo.run/display-name: "文档查看"
    rbac.authorization.halo.run/ui-permissions: |
      ["plugin:my-docs:libraries:view"]
rules:
  - apiGroups: ["my-docs.tsdaer.run"]
    resources: ["doclibraries", "docs"]
    verbs: ["get", "list"]
---
apiVersion: v1alpha1
kind: Role
metadata:
  name: my-docs-role-manage
  labels:
    halo.run/role-template: "true"
  annotations:
    rbac.authorization.halo.run/dependencies: |
      ["my-docs-role-view"]
    rbac.authorization.halo.run/module: "文档管理"
    rbac.authorization.halo.run/display-name: "文档管理"
    rbac.authorization.halo.run/ui-permissions: |
      ["plugin:my-docs:libraries:manage"]
rules:
  - apiGroups: ["my-docs.tsdaer.run"]
    resources: ["doclibraries", "docs"]
    verbs: ["*"]
  - apiGroups: ["console.api.my-docs.tsdaer.run"]
    resources: ["docs"]
    verbs: ["*"]
  # 仅限本插件自身的 configmap：Halo 在插件启动时已按 Setting 默认值自动创建该 ConfigMap，
  # 故无需 list/create；resourceNames 只能约束按名操作的动词（get/update/patch）。
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["my-docs-configmap"]
    verbs: ["get", "update", "patch"]
---
apiVersion: v1alpha1
kind: Role
metadata:
  name: my-docs-role-public
  labels:
    halo.run/role-template: "true"
    halo.run/hidden: "true"
    rbac.authorization.halo.run/aggregate-to-anonymous: "true"
rules:
  - apiGroups: ["api.my-docs.tsdaer.run"]
    resources: ["libraries", "docs", "trees"]
    verbs: ["get", "list"]
  - nonResourceURLs: ["/apis/api.my-docs.tsdaer.run/v1alpha1/**"]
    verbs: ["get"]
