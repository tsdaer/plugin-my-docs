apiVersion: v1alpha1
kind: Setting
metadata:
  name: my-docs-settings
spec:
  forms:
    - group: basic
      label: 基础设置
      formSchema:
        - $formkit: select
          name: defaultSort
          label: 默认排序
          value: priorityAsc
          options:
            - label: 排序权重升序
              value: priorityAsc
            - label: 创建时间倒序
              value: createdDesc
            - label: 标题升序
              value: titleAsc
        - $formkit: text
          name: defaultLibraryName
          label: 默认文档库
          value: ""
        - $formkit: number
          name: libraryIndexDefaultColumns
          label: 文档库首页默认每行个数
          value: 2
          validation: required|min:1|max:12
        - $formkit: number
          name: libraryIndexDefaultMaxRows
          label: 文档库首页默认每页最大行数
          value: 2
          validation: required|min:1|max:24
        - $formkit: select
          name: renderContentTheme
          label: 内容主题
          value: light
          options:
            - label: Light
              value: light
            - label: Dark
              value: dark
            - label: WeChat
              value: wechat
            - label: Ant Design
              value: ant-design
        - $formkit: text
          name: renderCodeTheme
          label: 代码主题
          value: github
        - $formkit: switch
          name: renderLineNumber
          label: 代码行号
          value: false
        - $formkit: switch
          name: renderAutoSpace
          label: 自动空格
          value: false
        - $formkit: switch
          name: renderGfmAutoLink
          label: 自动链接
          value: true
        - $formkit: switch
          name: renderFootnotes
          label: 脚注
          value: true
        - $formkit: switch
          name: renderMark
          label: Mark 标记
          value: false
        - $formkit: switch
          name: renderFixTermTypo
          label: 术语修正
          value: false
        - $formkit: switch
          name: renderParagraphBeginningSpace
          label: 段首空两格
          value: false
        - $formkit: switch
          name: renderCodeBlockPreview
          label: 代码块即时渲染
          value: true
        - $formkit: switch
          name: renderMathBlockPreview
          label: 公式块即时渲染
          value: true
        - $formkit: textarea
          name: customHeadHtml
          label: 全局自定义 head 代码
          help: "⚠️ 原样注入到全部文档阅读页 <head> 末尾，在访客浏览器执行。可放 <style>、meta、统计脚本。请仅填入可信代码。"
          value: ""
          rows: 5
        - $formkit: textarea
          name: customBodyHtml
          label: 全局自定义 body 代码
          help: "⚠️ 原样注入到全部文档阅读页 <body> 末尾，在访客浏览器执行。可放自定义 HTML、<script>。请仅填入可信代码。"
          value: ""
          rows: 5
