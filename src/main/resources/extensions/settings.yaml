apiVersion: v1alpha1
kind: Setting
metadata:
  name: my-docs-settings
spec:
  forms:
    - group: basic
      label: 基础设置
      formSchema:
        - $formkit: select
          name: defaultSort
          label: 默认排序
          value: priorityAsc
          options:
            - label: 排序权重升序
              value: priorityAsc
            - label: 创建时间倒序
              value: createdDesc
            - label: 标题升序
              value: titleAsc
        - $formkit: text
          name: defaultLibraryName
          label: 默认文档库
          value: ""
        - $formkit: number
          name: libraryIndexDefaultColumns
          label: 文档库首页默认每行个数
          value: 2
          validation: required|min:1|max:12
        - $formkit: number
          name: libraryIndexDefaultMaxRows
          label: 文档库首页默认每页最大行数
          value: 2
          validation: required|min:1|max:24
        - $formkit: select
          name: renderContentThemeLight
          label: 浅色内容主题
          value: light
          options:
            - label: Light
              value: light
            - label: Dark
              value: dark
            - label: WeChat
              value: wechat
            - label: Ant Design
              value: ant-design
            - label: 自定义 CSS
              value: custom
        - $formkit: text
          name: renderContentThemeLightUrl
          label: 浅色主题 CSS 地址
          help: "自定义主题时填写，仅支持 https:// 或 / 开头的站内绝对路径。"
          value: ""
        - $formkit: text
          name: renderContentThemeLightClass
          label: 浅色正文容器 class
          value: markdown-body
        - $formkit: select
          name: renderContentThemeDark
          label: 深色内容主题
          value: dark
          options:
            - label: Light
              value: light
            - label: Dark
              value: dark
            - label: WeChat
              value: wechat
            - label: Ant Design
              value: ant-design
            - label: 自定义 CSS
              value: custom
        - $formkit: text
          name: renderContentThemeDarkUrl
          label: 深色主题 CSS 地址
          help: "自定义主题时填写，仅支持 https:// 或 / 开头的站内绝对路径。"
          value: ""
        - $formkit: text
          name: renderContentThemeDarkClass
          label: 深色正文容器 class
          value: markdown-body
        - $formkit: text
          name: renderCodeThemeLight
          label: 浅色代码主题
          value: github
        - $formkit: text
          name: renderCodeThemeDark
          label: 深色代码主题
          value: github-dark
        - $formkit: switch
          name: renderLineNumber
          label: 代码行号
          help: 为普通围栏代码块显示行号。
          value: false
        - $formkit: switch
          name: renderAutoSpace
          label: 自动空格
          help: 在中文与英文、数字的边界自动补空格。
          value: false
        - $formkit: switch
          name: renderGfmAutoLink
          label: 自动链接
          help: 把 Markdown 中的裸 URL 自动转换为链接。
          value: true
        - $formkit: switch
          name: renderFootnotes
          label: 脚注
          help: 解析 [^1] 形式的 Markdown 脚注。
          value: true
        - $formkit: switch
          name: renderMark
          label: Mark 标记
          help: 把 ==文字== 渲染为高亮标记。
          value: false
        - $formkit: switch
          name: renderFixTermTypo
          label: 术语修正
          help: 修正常见技术术语的大小写，例如 github → GitHub。
          value: false
        - $formkit: switch
          name: renderParagraphBeginningSpace
          label: 段首空两格
          help: 为正文顶层段落添加两字符首行缩进。
          value: false
        - $formkit: switch
          name: renderCodeBlockPreview
          label: 图表代码块渲染
          help: 渲染 Mermaid、Graphviz、ECharts、Markmap 等特殊代码块。
          value: true
        - $formkit: switch
          name: renderMathBlockPreview
          label: 数学公式渲染
          help: 使用 KaTeX 渲染 $...$ 与 $$...$$ 公式。
          value: true
        - $formkit: textarea
          name: customHeadHtml
          label: 全局自定义 head 代码
          help: "⚠️ 原样注入到全部文档阅读页 <head> 末尾，在访客浏览器执行。可放 <style>、meta、统计脚本。请仅填入可信代码。"
          value: ""
          rows: 5
        - $formkit: textarea
          name: customBodyHtml
          label: 全局自定义 body 代码
          help: "⚠️ 原样注入到全部文档阅读页 <body> 末尾，在访客浏览器执行。可放自定义 HTML、<script>。请仅填入可信代码。"
          value: ""
          rows: 5
