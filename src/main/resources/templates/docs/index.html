<!doctype html>
<html lang="zh" data-color-scheme="auto" xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${seo.title}">文档</title>
  <meta name="description" th:content="${seo.description}">
  <meta property="og:title" th:content="${seo.title}">
  <meta property="og:description" th:content="${seo.description}">
  <meta property="og:type" th:content="${seo.ogType}">
  <th:block th:replace="~{plugin:my-docs:docs/modules/theme :: theme}"></th:block>
  <style>
    body { margin: 0; color: var(--mdocs-text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--mdocs-bg); transition: background-color .2s ease, color .2s ease; }
    .mdocs-page { max-width: 1120px; margin: 0 auto; padding: 48px 20px 72px; }
    .mdocs-title { margin: 0 0 8px; font-size: 32px; line-height: 1.2; color: var(--mdocs-text-strong); }
    .mdocs-muted { color: var(--mdocs-muted); }
    .mdocs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-top: 28px; }
    .mdocs-card { display: block; padding: 20px; color: inherit; text-decoration: none; background: var(--mdocs-surface); border: 1px solid var(--mdocs-border); border-radius: 8px; transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease, background-color .2s ease; }
    .mdocs-card:hover { border-color: var(--mdocs-accent); box-shadow: var(--mdocs-shadow); transform: translateY(-2px); }
    .mdocs-card-cover { display: block; width: calc(100% + 40px); height: 168px; margin: -20px -20px 16px; object-fit: cover; border-radius: 8px 8px 0 0; background: var(--mdocs-surface-soft); }
    .mdocs-card h2 { margin: 0 0 8px; font-size: 20px; }
    .mdocs-card p { margin: 0; line-height: 1.7; }
  </style>
</head>
<body>
  <main class="mdocs-page">
    <h1 class="mdocs-title">文档</h1>
    <p class="mdocs-muted" th:if="${#lists.isEmpty(libraries)}">暂无文档库。</p>
    <section class="mdocs-grid" th:if="${!#lists.isEmpty(libraries)}">
      <a class="mdocs-card" th:each="library : ${libraries}"
         th:href="@{/docs/{librarySlug}(librarySlug=${library.spec.slug})}">
        <img class="mdocs-card-cover" th:if="${!#strings.isEmpty(library.spec.cover)}"
             th:src="${library.spec.cover}" th:alt="${library.spec.title}">
        <h2 th:text="${library.spec.title}">Library</h2>
        <p class="mdocs-muted" th:text="${library.spec.description}">Description</p>
      </a>
    </section>
  </main>
</body>
</html>
