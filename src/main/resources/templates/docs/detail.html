<!doctype html>
<html lang="zh" xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${doc.spec.title}">文档</title>
  <style>
    body { margin: 0; color: #1f2937; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; }
    .mdocs-layout { display: grid; grid-template-columns: minmax(220px, 280px) minmax(0, 1fr); gap: 32px; max-width: 1180px; margin: 0 auto; padding: 36px 20px 72px; }
    .mdocs-sidebar { border-right: 1px solid #e2e8f0; padding-right: 20px; }
    .mdocs-back { color: #0f766e; text-decoration: none; font-size: 14px; }
    .mdocs-title { margin: 0 0 24px; font-size: 36px; line-height: 1.2; }
    .mdocs-content { line-height: 1.8; font-size: 16px; }
    .mdocs-content h2 { margin-top: 34px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; }
    .mdocs-content h3 { margin-top: 28px; }
    .mdocs-content pre { overflow-x: auto; padding: 16px; border-radius: 8px; background: #0f172a; color: #e2e8f0; }
    .mdocs-content code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .mdocs-content :not(pre) > code { padding: 2px 5px; border-radius: 4px; background: #f1f5f9; }
    .mdocs-content img { max-width: 100%; height: auto; }
    .mdocs-content table { width: 100%; border-collapse: collapse; }
    .mdocs-content th, .mdocs-content td { border: 1px solid #e2e8f0; padding: 8px 10px; }
    @media (max-width: 760px) { .mdocs-layout { display: block; } .mdocs-sidebar { border-right: 0; border-bottom: 1px solid #e2e8f0; padding: 0 0 20px; margin-bottom: 24px; } }
  </style>
</head>
<body>
  <main class="mdocs-layout">
    <aside class="mdocs-sidebar">
      <a class="mdocs-back" th:href="@{/docs/{librarySlug}(librarySlug=${library.spec.slug})}" th:text="${library.spec.title}">文档库</a>
      <div th:replace="~{plugin:my-docs:docs/modules/tree :: tree(nodes=${tree}, library=${library}, currentDoc=${doc})}"></div>
    </aside>
    <article>
      <h1 class="mdocs-title" th:text="${doc.spec.title}">文档标题</h1>
      <div class="mdocs-content" th:utext="${doc.spec.content}"></div>
    </article>
  </main>
</body>
</html>
