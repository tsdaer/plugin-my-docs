<!doctype html>
<html lang="zh" xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${seo.title}">文档</title>
  <meta name="description" th:content="${seo.description}">
  <meta property="og:title" th:content="${seo.title}">
  <meta property="og:description" th:content="${seo.description}">
  <meta property="og:type" th:content="${seo.ogType}">
  <meta property="og:image" th:if="${!#strings.isEmpty(seo.image)}" th:content="${seo.image}">
  <th:block th:replace="~{plugin:my-docs:docs/modules/theme :: theme}"></th:block>
  <th:block th:if="${!#strings.isEmpty(mdocsCustomHeadHtml)}" th:utext="${mdocsCustomHeadHtml}"></th:block>
  <link id="ratex-wasm-fonts" rel="stylesheet" href="/plugins/my-docs/assets/static/ratex/fonts.css"
        th:if="${detailContent.renderSettings.renderMathBlockPreview}">
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; color: var(--mdocs-text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--mdocs-bg); transition: background-color .2s ease, color .2s ease; }
    .mdocs-layout { display: grid; grid-template-columns: minmax(220px, 280px) minmax(0, 1fr); gap: 32px; max-width: 1180px; margin: 0 auto; padding: 36px 20px 72px; }
    .mdocs-layout--with-outline { grid-template-columns: minmax(220px, 280px) minmax(0, 1fr) minmax(190px, 240px); max-width: 1420px; }
    .mdocs-sidebar { border-right: 1px solid var(--mdocs-border); padding-right: 20px; }
    .mdocs-sidebar, .mdocs-outline { position: sticky; top: 24px; align-self: start; }
    .mdocs-article { min-width: 0; }
    .mdocs-back { color: var(--mdocs-accent); text-decoration: none; font-size: 14px; }
    .mdocs-eyebrow { margin: 0 0 10px; color: var(--mdocs-muted); font-size: 14px; }
    .mdocs-title { margin: 0 0 24px; font-size: 36px; line-height: 1.2; color: var(--mdocs-text-strong); }
    .mdocs-outline-drawer { display: none; margin: 0 0 24px; border: 1px solid var(--mdocs-border); border-radius: 12px; background: var(--mdocs-surface); box-shadow: var(--mdocs-shadow); overflow: hidden; }
    .mdocs-outline-drawer summary { cursor: pointer; padding: 14px 16px; color: var(--mdocs-text-strong); font-weight: 600; }
    .mdocs-outline-drawer[open] summary { border-bottom: 1px solid var(--mdocs-border); }
    .mdocs-outline-panel { padding: 12px 0; }
    .mdocs-outline-title { margin: 0 0 14px; color: var(--mdocs-text-strong); font-size: 14px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .mdocs-outline-list { list-style: none; margin: 0; padding: 0; }
    .mdocs-outline-item + .mdocs-outline-item { margin-top: 2px; }
    .mdocs-outline-row { display: flex; align-items: center; gap: 4px; padding-left: calc(var(--mdocs-outline-depth, 0) * 14px); border-radius: 8px; }
    .mdocs-outline-arrow { display: inline-flex; flex: 0 0 auto; align-items: center; justify-content: center; width: 16px; height: 28px; color: var(--mdocs-muted); opacity: .72; transition: transform .2s ease, color .2s ease, opacity .2s ease; }
    .mdocs-outline-arrow svg { width: 13px; height: 13px; pointer-events: none; }
    .mdocs-outline-arrow.is-empty { opacity: 0; }
    .mdocs-outline-item.is-expanded > .mdocs-outline-row .mdocs-outline-arrow { color: var(--mdocs-accent); opacity: 1; transform: rotate(90deg); }
    .mdocs-outline-link { display: block; flex: 1 1 auto; min-width: 0; padding: 7px 10px; color: var(--mdocs-muted); text-decoration: none; border-radius: 8px; font-size: 14px; line-height: 1.45; transition: color .2s ease, background-color .2s ease; }
    .mdocs-outline-link:hover, .mdocs-outline-link.is-active { color: var(--mdocs-accent); background: var(--mdocs-accent-soft); }
    .mdocs-outline-row:hover .mdocs-pin-button { opacity: 1; }
    .mdocs-content { min-width: 0; overflow-wrap: anywhere; }
    .mdocs-content :is(h1, h2, h3, h4, h5, h6) { scroll-margin-top: 88px; }
    .mdocs-content img { max-width: 100%; height: auto; }
    .mdocs-content pre { max-width: 100%; overflow-x: auto; }
    .mdocs-content .mdocs-indent-2 { text-indent: 2em; }
    .mdocs-content .mdocs-ratex { max-width: 100%; overflow-x: auto; overflow-y: hidden; }
    .mdocs-content .mdocs-ratex--inline { display: inline-block; padding: 0 .08em; vertical-align: -.35em; }
    .mdocs-content .mdocs-ratex--block { display: block; margin: 1em 0; text-align: center; }
    .mdocs-content.mdocs-theme-fallback { color: var(--mdocs-text); font-size: 16px; line-height: 1.8; }
    .mdocs-content.mdocs-theme-fallback a { color: var(--mdocs-accent); }
    .mdocs-content.mdocs-theme-fallback pre { padding: 16px; border-radius: 8px; background: var(--mdocs-code-bg); color: var(--mdocs-code-text); }
    .mdocs-content.mdocs-theme-fallback code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .mdocs-content.mdocs-theme-fallback table { width: 100%; border-collapse: collapse; }
    .mdocs-content.mdocs-theme-fallback th, .mdocs-content.mdocs-theme-fallback td { border: 1px solid var(--mdocs-border); padding: 8px 10px; }
    .mdocs-content :target { animation: mdocs-target-flash 1.6s ease; }
    @keyframes mdocs-target-flash {
      0% { background: transparent; }
      18% { background: var(--mdocs-accent-soft); }
      100% { background: transparent; }
    }
    @media (max-width: 980px) {
      .mdocs-layout, .mdocs-layout--with-outline { grid-template-columns: minmax(220px, 260px) minmax(0, 1fr); max-width: 1180px; }
      .mdocs-outline { display: none; }
      .mdocs-outline-drawer { display: block; }
    }
    @media (max-width: 760px) {
      .mdocs-layout, .mdocs-layout--with-outline { display: block; }
      .mdocs-sidebar { position: static; border-right: 0; border-bottom: 1px solid var(--mdocs-border); padding: 0 0 20px; margin-bottom: 24px; }
      .mdocs-title { font-size: 30px; }
    }
  </style>
</head>
<body>
  <main class="mdocs-layout" th:classappend="${!#lists.isEmpty(detailContent.outline)} ? ' mdocs-layout--with-outline'">
    <aside class="mdocs-sidebar">
      <a class="mdocs-back" th:href="@{/docs/{librarySlug}(librarySlug=${library.spec.slug})}" th:text="${library.spec.title}">文档库</a>
      <div th:replace="~{plugin:my-docs:docs/modules/tree :: tree(nodes=${tree}, library=${library}, currentDoc=${doc})}"></div>
    </aside>
    <article class="mdocs-article">
      <p class="mdocs-eyebrow" th:text="${library.spec.title}">文档库</p>
      <h1 class="mdocs-title" th:text="${doc.spec.title}">文档标题</h1>
      <details class="mdocs-outline-drawer" th:if="${!#lists.isEmpty(detailContent.outline)}">
        <summary>本页目录</summary>
        <div class="mdocs-outline-panel"
             th:replace="~{plugin:my-docs:docs/modules/outline :: outline(items=${detailContent.outline})}"></div>
      </details>
      <div id="mdocs-content" class="mdocs-content mdocs-theme-fallback" th:utext="${detailContent.html}"></div>
    </article>
    <aside class="mdocs-outline" th:if="${!#lists.isEmpty(detailContent.outline)}">
      <p class="mdocs-outline-title">本页目录</p>
      <div th:replace="~{plugin:my-docs:docs/modules/outline :: outline(items=${detailContent.outline})}"></div>
    </aside>
  </main>
  <th:block th:replace="~{plugin:my-docs:docs/modules/collapse :: collapse}"></th:block>
  <script src="/plugins/my-docs/assets/static/vditor/dist/method.min.js"></script>
  <script th:inline="javascript">
    (function () {
      var content = document.getElementById('mdocs-content');
      if (!content) {
        return;
      }

      var settings = {
        contentThemeLightUrl: /*[[${detailContent.renderSettings.renderContentThemeLightUrl}]]*/ '',
        contentThemeDarkUrl: /*[[${detailContent.renderSettings.renderContentThemeDarkUrl}]]*/ '',
        contentThemeLightClass: /*[[${detailContent.renderSettings.renderContentThemeLightClass}]]*/ 'markdown-body',
        contentThemeDarkClass: /*[[${detailContent.renderSettings.renderContentThemeDarkClass}]]*/ 'markdown-body',
        codeThemeLight: /*[[${detailContent.renderSettings.renderCodeThemeLight}]]*/ 'github',
        codeThemeDark: /*[[${detailContent.renderSettings.renderCodeThemeDark}]]*/ 'github-dark',
        lineNumber: /*[[${detailContent.renderSettings.renderLineNumber}]]*/ false,
        codeBlockPreview: /*[[${detailContent.renderSettings.renderCodeBlockPreview}]]*/ true,
        mathBlockPreview: /*[[${detailContent.renderSettings.renderMathBlockPreview}]]*/ true,
      };
      var cdn = '/plugins/my-docs/assets/static/vditor';
      var ratexBase = '/plugins/my-docs/assets/static/ratex';
      var managedClasses = [];
      var loadedThemeHref = '';
      var mathColorRefreshFrame;
      var mathColorRefreshFollowUpFrame;
      var mathColorRefreshTimer;
      var themeLink = document.createElement('link');
      var baseLink = document.createElement('link');
      themeLink.rel = 'stylesheet';
      themeLink.id = 'mdocs-content-theme';
      baseLink.rel = 'stylesheet';
      baseLink.id = 'mdocs-vditor-base';
      baseLink.href = cdn + '/dist/index.css';
      document.head.appendChild(themeLink);
      document.head.appendChild(baseLink);

      function currentScheme() {
        return document.documentElement.getAttribute('data-mdocs-effective-scheme') === 'dark'
          ? 'dark' : 'light';
      }

      function clearManagedClasses() {
        managedClasses.forEach(function (name) { content.classList.remove(name); });
        managedClasses = [];
      }

      function addManagedClasses(value) {
        String(value || '').split(/\s+/).filter(Boolean).forEach(function (name) {
          content.classList.add(name);
          managedClasses.push(name);
        });
      }

      function applyTheme(scheme) {
        var suffix = scheme === 'dark' ? 'Dark' : 'Light';
        var customUrl = settings['contentTheme' + suffix + 'Url'];
        var customClass = settings['contentTheme' + suffix + 'Class'];
        var codeTheme = settings['codeTheme' + suffix];

        clearManagedClasses();
        content.classList.add('mdocs-theme-fallback');
        addManagedClasses(customClass);
        var nextThemeHref = customUrl;
        themeLink.onload = function () {
          loadedThemeHref = nextThemeHref;
          content.classList.remove('mdocs-theme-fallback');
          scheduleMathColorRefresh();
        };
        themeLink.onerror = function () {
          loadedThemeHref = '';
          content.classList.add('mdocs-theme-fallback');
        };
        if (!nextThemeHref) {
          loadedThemeHref = '';
          themeLink.removeAttribute('href');
        } else if (loadedThemeHref === nextThemeHref) {
          content.classList.remove('mdocs-theme-fallback');
        } else {
          themeLink.href = nextThemeHref;
        }

        if (window.Vditor) {
          window.Vditor.setCodeTheme(codeTheme, cdn);
        }
        scheduleMathColorRefresh();
      }

      function colorToHex(value, scheme) {
        var normalized = String(value || '').trim();
        if (/^#[0-9a-f]{3,8}$/i.test(normalized)) {
          return normalized;
        }
        var match = normalized.match(/^rgba?\(\s*(\d+)\D+(\d+)\D+(\d+)(?:\D+([\d.]+))?\s*\)$/i);
        if (!match) {
          return scheme === 'dark' ? '#e5edf7' : '#1f2937';
        }
        var parts = [match[1], match[2], match[3]].map(function (part) {
          return Math.max(0, Math.min(255, Number(part))).toString(16).padStart(2, '0');
        });
        if (match[4] !== undefined && Number(match[4]) < 1) {
          parts.push(Math.round(Math.max(0, Math.min(1, Number(match[4]))) * 255)
            .toString(16).padStart(2, '0'));
        }
        return '#' + parts.join('');
      }

      function currentMathColor(scheme) {
        var effectiveScheme = scheme === 'dark' ? 'dark' : 'light';
        var contentColor = window.getComputedStyle(content).color;
        var rootStyle = window.getComputedStyle(document.documentElement);
        var themeColor = rootStyle.getPropertyValue('--mdocs-text').trim();
        return colorToHex(contentColor || themeColor, effectiveScheme);
      }

      function refreshMathColor() {
        var color = currentMathColor(currentScheme());
        content.querySelectorAll('ratex-formula.mdocs-ratex').forEach(function (formula) {
          formula.setAttribute('color', color);
        });
      }

      function scheduleMathColorRefresh() {
        refreshMathColor();
        window.cancelAnimationFrame(mathColorRefreshFrame);
        window.cancelAnimationFrame(mathColorRefreshFollowUpFrame);
        mathColorRefreshFrame = window.requestAnimationFrame(function () {
          refreshMathColor();
          mathColorRefreshFollowUpFrame = window.requestAnimationFrame(function () {
            refreshMathColor();
          });
        });
        window.clearTimeout(mathColorRefreshTimer);
        mathColorRefreshTimer = window.setTimeout(function () {
          refreshMathColor();
        }, 250);
      }

      function loadRatexFonts() {
        if (!document.fonts || typeof document.fonts.load !== 'function') {
          return Promise.resolve();
        }
        var fontFaces = [
          '18px KaTeX_AMS',
          '18px KaTeX_Caligraphic',
          '18px KaTeX_Fraktur',
          'bold 18px KaTeX_Fraktur',
          '18px KaTeX_Main',
          'bold 18px KaTeX_Main',
          'italic 18px KaTeX_Main',
          'italic bold 18px KaTeX_Main',
          'italic 18px KaTeX_Math',
          'italic bold 18px KaTeX_Math',
          '18px KaTeX_SansSerif',
          'bold 18px KaTeX_SansSerif',
          'italic 18px KaTeX_SansSerif',
          '18px KaTeX_Script',
          '18px KaTeX_Size1',
          '18px KaTeX_Size2',
          '18px KaTeX_Size3',
          '18px KaTeX_Size4',
          '18px KaTeX_Typewriter',
        ];
        return Promise.all(fontFaces.map(function (fontFace) {
          return document.fonts.load(fontFace);
        })).then(function () {});
      }

      function fallbackMathRender() {
        if (window.Vditor && content.querySelector('.language-math')) {
          window.Vditor.mathRender(content, { cdn: cdn });
        }
      }

      function renderMathWithRatex() {
        var mathNodes = Array.prototype.slice.call(content.querySelectorAll('.language-math'));
        if (mathNodes.length === 0) {
          return Promise.resolve();
        }
        var ratexModule;
        return Promise.all([loadRatexFonts(), import(ratexBase + '/dist/index.js')])
          .then(function (results) {
            ratexModule = results[1];
            return ratexModule.initRatex();
          })
          .then(function () {
            return import(ratexBase + '/dist/ratex-formula.js');
          })
          .then(function () {
            var color = currentMathColor(currentScheme());
            mathNodes.forEach(function (node) {
              var latex = String(node.textContent || '').trim();
              if (!latex) {
                return;
              }
              try {
                ratexModule.renderLatexToDisplayList(latex, color);
                var block = node.tagName === 'DIV';
                var formula = document.createElement('ratex-formula');
                formula.className = 'mdocs-ratex ' + (block
                  ? 'mdocs-ratex--block' : 'mdocs-ratex--inline');
                formula.setAttribute('latex', latex);
                formula.setAttribute('font-size', block ? '22' : '18');
                formula.setAttribute('padding', block ? '8' : '1');
                formula.setAttribute('background-color', 'transparent');
                formula.setAttribute('color', color);
                formula.setAttribute('role', 'math');
                formula.setAttribute('aria-label', latex);
                node.replaceWith(formula);
              } catch (error) {
                console.warn('[my-docs] RaTeX formula rendering failed.', error);
              }
            });
            fallbackMathRender();
          })
          .catch(function (error) {
            console.warn('[my-docs] RaTeX initialization failed; falling back to Vditor.', error);
            fallbackMathRender();
          });
      }

      function enhanceContent() {
        var scheme = currentScheme();
        var suffix = scheme === 'dark' ? 'Dark' : 'Light';
        var codeTheme = settings['codeTheme' + suffix];
        var highlightOptions = { style: codeTheme, lineNumber: settings.lineNumber };
        if (window.Vditor) {
          window.Vditor.highlightRender(highlightOptions, content, cdn);
          window.Vditor.codeRender(content, highlightOptions);
          if (settings.codeBlockPreview) {
            window.Vditor.mermaidRender(content, cdn, scheme);
            window.Vditor.flowchartRender(content, cdn);
            window.Vditor.graphvizRender(content, cdn);
            window.Vditor.chartRender(content, cdn, scheme);
            window.Vditor.mindmapRender(content, cdn, scheme);
            window.Vditor.markmapRender(content, cdn);
            window.Vditor.plantumlRender(content, cdn);
            window.Vditor.abcRender(content, cdn);
            window.Vditor.SMILESRender(content, cdn, scheme);
          }
        }
        return settings.mathBlockPreview ? renderMathWithRatex() : Promise.resolve();
      }

      applyTheme(currentScheme());
      Promise.resolve().then(enhanceContent).catch(function (error) {
        console.warn('[my-docs] Frontend markdown enhancement failed.', error);
      });
      window.addEventListener('mdocs:scheme-change', function (event) {
        applyTheme(event.detail && event.detail.scheme === 'dark' ? 'dark' : 'light');
      });
    })();
  </script>
  <th:block th:if="${!#strings.isEmpty(mdocsCustomBodyHtml)}" th:utext="${mdocsCustomBodyHtml}"></th:block>
</body>
</html>
