<th:block xmlns:th="https://www.thymeleaf.org" th:fragment="theme">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      var root = document.documentElement;
      var observedAttributes = [
        'class',
        'data-color-scheme',
        'data-scheme',
        'data-theme',
        'data-mode',
      ];
      var managedSchemeAttribute = 'data-mdocs-color-scheme';
      var effectiveSchemeAttribute = 'data-mdocs-effective-scheme';
      var systemDark = window.matchMedia('(prefers-color-scheme: dark)');
      var storageKeys = [
        'StackColorScheme',
        'color-scheme',
        'colorScheme',
        'theme',
        'Theme',
        'appearance',
        'mode',
      ];

      function normalizeScheme(value) {
        if (!value) {
          return null;
        }
        var normalized = String(value).trim().toLowerCase();
        if (normalized === 'dark' || normalized === 'night') {
          return 'dark';
        }
        if (normalized === 'light' || normalized === 'day') {
          return 'light';
        }
        if (normalized === 'auto' || normalized === 'system') {
          return 'auto';
        }
        return null;
      }

      function detectFromElement(element) {
        if (!element) {
          return null;
        }

        var dataColorScheme = element.getAttribute('data-color-scheme');
        if (element === root && dataColorScheme === root.getAttribute(managedSchemeAttribute)) {
          dataColorScheme = null;
        }

        var direct = normalizeScheme(dataColorScheme)
          || normalizeScheme(element.getAttribute('data-scheme'))
          || normalizeScheme(element.getAttribute('data-theme'))
          || normalizeScheme(element.getAttribute('data-mode'));
        if (direct) {
          return direct;
        }

        var classes = element.classList;
        if (!classes) {
          return null;
        }
        if (
          classes.contains('dark')
          || classes.contains('color-scheme-dark')
          || classes.contains('theme-dark')
          || classes.contains('dark-mode')
        ) {
          return 'dark';
        }
        if (
          classes.contains('light')
          || classes.contains('color-scheme-light')
          || classes.contains('theme-light')
          || classes.contains('light-mode')
        ) {
          return 'light';
        }
        if (classes.contains('color-scheme-auto') || classes.contains('theme-auto')) {
          return 'auto';
        }
        return null;
      }

      function detectFromStorage() {
        try {
          for (var index = 0; index < storageKeys.length; index += 1) {
            var stored = normalizeScheme(localStorage.getItem(storageKeys[index]));
            if (stored) {
              return stored;
            }
          }
        } catch (error) {
          // Storage can be unavailable in privacy modes; DOM and system signals still work.
        }
        return null;
      }

      function detectScheme() {
        return detectFromElement(document.body)
          || detectFromElement(root)
          || detectFromStorage()
          || 'auto';
      }

      function applyScheme(nextScheme) {
        var currentManagedScheme = root.getAttribute(managedSchemeAttribute);
        if (!nextScheme) {
          if (currentManagedScheme && root.getAttribute('data-color-scheme') === currentManagedScheme) {
            root.removeAttribute('data-color-scheme');
          }
          root.removeAttribute(managedSchemeAttribute);
        } else {
          root.setAttribute(managedSchemeAttribute, nextScheme);
          if (root.getAttribute('data-color-scheme') !== nextScheme) {
            root.setAttribute('data-color-scheme', nextScheme);
          }
        }

        var effectiveScheme = nextScheme === 'dark'
          ? 'dark'
          : (nextScheme === 'auto' || !nextScheme) && systemDark.matches ? 'dark' : 'light';
        if (root.getAttribute(effectiveSchemeAttribute) !== effectiveScheme) {
          root.setAttribute(effectiveSchemeAttribute, effectiveScheme);
          window.dispatchEvent(new CustomEvent('mdocs:scheme-change', {
            detail: { scheme: effectiveScheme },
          }));
        }
      }

      function syncScheme() {
        applyScheme(detectScheme());
      }

      syncScheme();

      var startObserver = function () {
        syncScheme();
        var observer = new MutationObserver(syncScheme);
        observer.observe(root, {
          attributes: true,
          attributeFilter: observedAttributes,
        });
        if (document.body) {
          observer.observe(document.body, {
            attributes: true,
            attributeFilter: observedAttributes,
          });
        }
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', startObserver, { once: true });
      } else {
        startObserver();
      }
      if (systemDark.addEventListener) {
        systemDark.addEventListener('change', syncScheme);
      } else {
        systemDark.addListener(syncScheme);
      }
      window.addEventListener('storage', function (event) {
        if (!event.key || storageKeys.indexOf(event.key) >= 0) {
          syncScheme();
        }
      });
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --mdocs-bg: #f8fafc;
      --mdocs-surface: #ffffff;
      --mdocs-surface-soft: #f1f5f9;
      --mdocs-hero-bg: linear-gradient(135deg, #f8fafc, #ecfeff);
      --mdocs-text: #1f2937;
      --mdocs-text-strong: #0f172a;
      --mdocs-muted: #64748b;
      --mdocs-border: #e2e8f0;
      --mdocs-accent: #0f766e;
      --mdocs-accent-soft: #ecfdf5;
      --mdocs-code-bg: #0f172a;
      --mdocs-code-text: #e2e8f0;
      --mdocs-inline-code-bg: #f1f5f9;
      --mdocs-shadow: 0 12px 30px rgba(15, 118, 110, 0.08);
    }

    html[data-color-scheme="light"],
    html[data-scheme="light"],
    html.light,
    html.color-scheme-light,
    html.theme-light,
    html.light-mode {
      color-scheme: light;
    }

    html[data-color-scheme="dark"],
    html[data-scheme="dark"],
    html[data-mdocs-effective-scheme="dark"],
    html.dark,
    html.color-scheme-dark,
    html.theme-dark,
    html.dark-mode {
      color-scheme: dark;
      --mdocs-bg: #020617;
      --mdocs-surface: #0f172a;
      --mdocs-surface-soft: #111827;
      --mdocs-hero-bg: linear-gradient(135deg, #0f172a, #082f49);
      --mdocs-text: #e5edf7;
      --mdocs-text-strong: #f8fafc;
      --mdocs-muted: #94a3b8;
      --mdocs-border: #1e293b;
      --mdocs-accent: #5eead4;
      --mdocs-accent-soft: rgba(45, 212, 191, 0.14);
      --mdocs-code-bg: #020617;
      --mdocs-code-text: #dbeafe;
      --mdocs-inline-code-bg: #172036;
      --mdocs-shadow: 0 18px 40px rgba(2, 6, 23, 0.45);
    }

    html[data-color-scheme="auto"],
    html[data-scheme="auto"],
    html.color-scheme-auto,
    html.theme-auto {
      color-scheme: light dark;
    }
  </style>
</th:block>
