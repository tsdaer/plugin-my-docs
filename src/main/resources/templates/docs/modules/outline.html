<nav xmlns:th="https://www.thymeleaf.org" th:fragment="outline(items)">
  <ul class="mdocs-outline-list" th:if="${!#lists.isEmpty(items)}">
    <li class="mdocs-outline-item" th:each="item : ${items}">
      <a class="mdocs-outline-link"
         th:attr="href=${'#' + item.id},data-target=${item.id}"
         th:style="'--mdocs-outline-depth:' + ${item.depth}"
         th:text="${item.text}">Heading</a>
    </li>
  </ul>
</nav>
