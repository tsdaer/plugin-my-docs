name: Rebuild Release Asset

# 手动触发：按指定 tag 重新编译 jar 并覆盖该 Release 的附件。
# 用于 tag 已存在、但需要用新代码重新产出 jar 的场景（无需改动 tag 名）。
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "要重新编译的 Release tag（如 v1.0.0）"
        required: true
        type: string

jobs:
  rebuild:
    name: Rebuild and Upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Environment
        uses: halo-sigs/reusable-workflows/plugin-setup-env@v4
        with:
          cache-dept-path: ui/pnpm-lock.yaml
          node-version: "24"
          pnpm-version: "10"
          java-version: "21"

      - name: Build
        run: |
          version=${{ inputs.tag }}
          ./gradlew clean build -x check -Pversion=${version#v}

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ inputs.tag }} build/libs/* --clobber
